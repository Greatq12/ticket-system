<!DOCTYPE html>
<html>
<head>
  <title>Helpdesk Ticket System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Ticket System</h1>

<h2>Create Ticket</h2>
<input id="title" placeholder="Issue title">
<input id="desc" placeholder="Description">
<select id="priority">
  <option>Low</option>
  <option>Medium</option>
  <option>High</option>
</select>
<button onclick="createTicket()">Submit</button>

<h2>Tickets</h2>
<div id="tickets"></div>

<script src="app.js"></script>
</body>
</html>
